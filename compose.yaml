services:
  mc:
    image: itzg/minecraft-server:latest
    container_name: mc-paper-dev
    environment:
      TYPE: PAPER
      EULA: "TRUE"
      VERSION: LATEST
      RCON_PASSWORD: "${RCON_PASSWORD:-secret-dev-password}"
      ENABLE_RCON: "true"
    ports:
      - "25565:25565"
      - "25575:25575"
    volumes:
      - mc_data:/data

volumes:
  mc_data:
